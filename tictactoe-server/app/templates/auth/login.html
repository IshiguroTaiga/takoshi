{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-800 p-8 rounded shadow">
    <h2 class="text-2xl mb-4">Login</h2>
    <form method="POST">
        <input name="username" placeholder="Username" class="w-full p-2 mb-4 bg-slate-700 rounded border border-slate-600">
        <input name="password" type="password" placeholder="Password" class="w-full p-2 mb-4 bg-slate-700 rounded border border-slate-600">
        <button class="w-full bg-blue-600 p-2 rounded hover:bg-blue-500">Login</button>
    </form>
    <p class="mt-4">No account? <a href="/signup" class="text-blue-400">Sign up</a></p>
</div>
{% endblock %}
